name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build store (/)
        working-directory: apps/store
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_GRAPHQL_ENDPOINT: ""

      - name: Build admin (/admin/)
        working-directory: apps/admin
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_GRAPHQL_ENDPOINT: ""

      - name: Merge admin into store dist
        run: |
          mkdir -p apps/store/dist/admin
          cp -r apps/admin/dist/. apps/store/dist/admin/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/store/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
